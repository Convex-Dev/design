name: Build check

# Build the docs on pull requests and branch pushes so broken links
# (onBrokenLinks: 'throw') are caught before they reach master.
# master itself is built and deployed by deploy.yml.
on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  build:
    name: Build website (link check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build website
        run: pnpm build
